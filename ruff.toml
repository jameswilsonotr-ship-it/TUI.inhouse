# ruff.toml - Linting placeholder for Olivia Dev projects (copied from .research/templates/)
# Includes docstring enforcement (D rules).

target-version = "py312"
line-length = 88

[lint]
select = [
    "E",   # pycodestyle errors
    "F",   # Pyflakes
    "I",   # isort
    "W",   # pycodestyle warnings
    "D",   # pydocstyle (docstrings)
    "UP",  # pyupgrade
]
ignore = [
    "D203",  # 1 blank line required before class docstring (conflict with D211)
    "D212",  # Multi-line docstring summary should start at the first line
]

[lint.pydocstyle]
convention = "google"  # or "numpy"

[format]
quote-style = "double"
